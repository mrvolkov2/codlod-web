<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodLod - The creative rush</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent-color: #00e5ff;
            --text-secondary: #516087;
        }

        body {
            background-color: #050914; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* Шапка сайта */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            z-index: 10;
            backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--accent-color);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 30px;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            transition: 0.3s;
            opacity: 0.8;
        }

        nav a:hover {
            color: var(--accent-color);
            opacity: 1;
        }

        .btn-glow {
            padding: 8px 18px;
            border: 1px solid var(--accent-color);
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }

        /* Контент */
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none; 
            text-align: center;
            padding: 0 20px;
        }

        h1 {
            font-size: 5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
            margin-bottom: 15px;
            animation: fadeInDown 1s ease-out;
        }

        .slogan {
            font-size: 1.2rem;
            letter-spacing: 3px;
            font-weight: 300;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--text-secondary) 0%, var(--accent-color) 50%, var(--text-secondary) 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: fadeInUp 1.2s ease-out, shine 3s linear infinite;
            margin-bottom: 40px;
        }

        /* Кнопка { code } */
        .engine-container {
            pointer-events: auto; /* Делаем кнопку кликабельной */
            animation: fadeInUp 1.5s ease-out;
        }

        .code-block {
            display: inline-block;
            padding: 15px 30px;
            border: 2px solid var(--accent-color);
            border-radius: 50px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.5rem;
            color: var(--accent-color);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(0, 229, 255, 0.05);
        }

        .code-block span {
            font-weight: bold;
        }

        .code-block:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 30px var(--accent-color);
            background: rgba(0, 229, 255, 0.15);
            color: white;
        }

        /* Анимации */
        @keyframes shine { to { background-position: 200% center; } }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">CODLOD<span> STUDIO</span></div>
        <nav>
            <a href="#projects">Проекты</a>
            <a href="https://myrating.autos" target="_blank">MyRating</a>
            <a href="#contact" class="btn-glow">Запустить проект</a>
        </nav>
    </header>

    <div class="content">
        <h1>Codlod</h1>
        <p class="slogan">The creative rush you're feeling right now</p>
        
        <div class="engine-container">
            <div class="code-block"><span>{</span> code <span>}</span></div>
        </div>
    </div>

    <canvas id="canvas1"></canvas>

    <script>
        const canvas = document.getElementById('canvas1');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray;
        let mouse = { x: null, y: null, radius: 120 }

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
                this.density = (Math.random() * 30) + 1; 
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = '#00e5ff'; 
                ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;

                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < mouse.radius) {
                    let forceDirectionX = dx / distance;
                    let forceDirectionY = dy / distance;
                    let maxDistance = mouse.radius;
                    let force = (maxDistance - distance) / maxDistance;
                    let directionX = forceDirectionX * force * this.density;
                    let directionY = forceDirectionY * force * this.density;
                    this.x -= directionX;
                    this.y -= directionY;
                }
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 10000; 
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 1.5) - 0.75; 
                let directionY = (Math.random() * 1.5) - 0.75; 
                particlesArray.push(new Particle(x, y, directionX, directionY, size, '#00e5ff'));
            }
        }

        function connect() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                    + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    if (distance < (canvas.width / 7) * (canvas.height / 7)) {
                        let opacityValue = 1 - (distance / 20000); 
                        ctx.strokeStyle = 'rgba(0, 229, 255,' + opacityValue + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        window.addEventListener('resize', function() {
            canvas.width = innerWidth;
            canvas.height = innerHeight;
            init();
        });

        window.addEventListener('mouseout', function() {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        init();
        animate();
    </script>
</body>
</html>
